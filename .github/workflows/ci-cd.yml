name: MLOps Pipeline

on:
  push:
    branches: [main]
    # Don't waste 80 min training on README/docs changes
    paths-ignore:
      - 'README.md'
      - 'assets/**'
      - '**.md'
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 6AM UTC — weekly retrain
  workflow_dispatch:       # Manual trigger

concurrency:
  group: mlops-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  HF_MODEL_ID: karaboLLM/sentiment-distilbert
  HF_SPACE_ID: karaboLLM/ml-observability

jobs:
  # ─── Job 1: Train & Evaluate ───────────────────────────────────
  train:
    runs-on: [self-hosted, Linux, X64, hetzner]
    # Skip full training for app-only or script-only changes.
    # Full training only runs when model code, CI config, or deps change.
    if: |
      github.event_name != 'push' ||
      contains(join(github.event.commits.*.modified, ','), 'model/') ||
      contains(join(github.event.commits.*.added, ','), 'model/') ||
      contains(join(github.event.commits.*.modified, ','), '.github/') ||
      contains(join(github.event.commits.*.modified, ','), 'pyproject.toml')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: model/requirements.txt

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r model/requirements.txt

      - name: Train model
        run: python model/train.py

      - name: Copy reference stats for tests
        run: |
          mkdir -p app/model
          cp model_output/reference_stats.json app/model/

      - name: Run tests
        run: |
          pip install pytest
          pytest tests/ -v

      - name: Push model to Hugging Face Hub
        if: ${{ env.HF_TOKEN != '' }}
        run: python model/push_to_hub.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-output
          path: model_output/
          retention-days: 7

  # ─── Job 2: Deploy to HF Spaces ────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [train]
    # Run regardless of whether train ran or was skipped
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install deploy dependencies
        run: pip install huggingface-hub requests

      - name: Download model artifacts (if available)
        if: needs.train.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: model-output
          path: model_output/

      - name: Sync reference stats for drift detection
        run: python scripts/sync_reference_stats.py

      - name: Deploy to Hugging Face Space
        run: python scripts/deploy_space.py

  # ─── Job 3: Health Check ───────────────────────────────────────
  health-check:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install requests

      - name: Check Space deployment status
        run: python scripts/health_check.py
